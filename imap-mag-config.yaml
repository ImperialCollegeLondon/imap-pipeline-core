# Application settings used by CLI and Prefect tasks See AppSettings for strongly typed python class

# Settings in this file can be overridden by environment variables e.g. MAG_FETCH_BINARY_API_URL_BASE=http://localhost:1234
# and by dictionaries passed into the constructor of the AppSettings class

# General application conifguration:
work_folder: '.work'
data_store:  'tests/datastore'
packet_definition: 'packet_def/'
disk_usage_threshold: 0.95  # Block file operations when filesystem is >= 95 % full
version_major: 1

# SPICE kernel types included when generating a metakernel. Shared by the
# calibration applicator and the scripted L2 calibration.
metakernel_file_types:
    - leapseconds
    - planetary_constants
    - science_frames
    - imap_frames
    - spacecraft_clock
    - attitude_history
    - pointing_attitude
    - planetary_ephemeris
    - ephemeris_reconstructed

sdc: &sdc_creds
    url_base: "https://api.dev.imap-mission.com"
    auth_code:

# Command specific configuration:
check_ialirt:
    work_sub_folder:

fetch_binary:
    api:
        url_base: "https://lasp.colorado.edu/ops/imap/poda/dap2/packets/SID2/"
        auth_code:
    work_sub_folder:
    publish_to_data_store: true

fetch_ialirt:
    api:
        url_base: "https://ialirt.dev.imap-mission.com"
        auth_code:
    work_sub_folder:
    publish_to_data_store: true

fetch_science:
    api:
        <<: *sdc_creds
    work_sub_folder:
    publish_to_data_store: true

fetch_spice:
    api:
        <<: *sdc_creds
    work_sub_folder: spice
    publish_to_data_store: true

fetch_solar1_ace:
    api:
        url_base: "https://services.swpc.noaa.gov/json/rtsw"

fetch_dscovr:
    api:
        url_base: "https://services.swpc.noaa.gov/products/solar-wind"

fetch_webtcad:
    api:
        # Example URL: https://lasp.colorado.edu/ops/imap/webtcad/latis/dap/AnalogTelemetryItem_SID1.csv?TMID=58350&time,value&time%3E=2026-02-11T13:43:32.000Z&time%3C=2026-02-12T13:43:32.000Z&format_time(yyyy-MM-dd%27T%27HH:mm:ss.SSS)&limit(10)
        url_base: "https://lasp.colorado.edu/ops/imap/webtcad/latis/dap/"
        auth_code:
        system_id: "SID1" # SID1 is flight, SID2 is preflight
    work_sub_folder:
    publish_to_data_store: true

plot_ialirt:
    work_sub_folder:
    publish_to_data_store: true

calibration:
    work_sub_folder:

# Configuration for the calibrate flow. work_sub_folder supports {date}/{mode}/{sensor}
# placeholders so each calibrate run gets its own uniquely-named work folder.
calibrate:
    work_sub_folder: 'calibrate_{date}_{mode}'
    scripted_l2_timeout_seconds_per_day_norm: 600    # 10 minutes per day of norm data
    scripted_l2_timeout_seconds_per_day_burst: 3600  # 60 minutes per day of burst data
    # Files copied into the sparse datastore (LOCAL_WORK_FOLDER_COPY mode). Paths are
    # relative to the datastore root; dates use strftime codes (%Y/%m/%d), and
    # {level}/{mode}/{matrix_version} are filled from the run. days_before/days_after
    # (default 0) widen the copy to neighbouring days for inputs that need them.
    sparse_datastore:
        patterns:
            # L1 science - only the day being calibrated (large per-day files).
            - pattern: 'science/mag/{level}/%Y/%m/imap_mag_{level}_{mode}-mago_%Y%m%d_v*.cdf'
            - pattern: 'science/mag/{level}/%Y/%m/imap_mag_{level}_{mode}-magi_%Y%m%d_v*.cdf'
            # Spacecraft HK (x285 packet) for interference/thruster cleaning.
            - pattern: 'hk/sc/l1/x285/%Y/%m/imap_sc_l1_x285_%Y%m%d_v*.csv'
            # IMAP-Lo pivot-platform HK - needs the nearest neighbouring days too.
            - pattern: 'hk/lo/l1/pivot-platform-angle/%Y/%m/imap_lo_l1_pivot-platform-angle_%Y%m%d_v{sequence}.csv'
              days_before: 1
              days_after: 1
              get_previous_if_empty: true
              highest_sequence_only: true

            # Only the calibration matrices version in use (each version is large).
            - pattern: 'calibration/inputs/Matrices/CalibrationMatricesV{matrix_version}.mat'
            - pattern: 'calibration/inputs/Matrices/CalibrationMatricesV{matrix_version}.json'
            # Interference / thruster profiles.
            - pattern: 'calibration/inputs/Profiles/**/*'
            # Pre-computed offsets (spin plane / spin axis / leinweber / kepko).
            - pattern: 'calibration/calculated_offsets/kepko/*'
            - pattern: 'calibration/calculated_offsets/leinweber/*'
            - pattern: 'calibration/calculated_offsets/spin_axis/*'
            - pattern: 'calibration/calculated_offsets/spin_optimised/imap_mag_*-spin-plane-offsets_%Y%m%d_v{sequence}.csv*'
              days_before: 1
              days_after: 1
              get_previous_if_empty: true
              highest_sequence_only: true
            - pattern: 'calibration/calculated_offsets/spin_plane/imap_mag_*-spin-plane-offsets_%Y%m%d_v{sequence}.csv*'
              days_before: 2
              days_after: 2
              get_previous_if_empty: true
              highest_sequence_only: true

            # Spin table + thruster activities (small, span the run). Filenames encode
            # a day-of-year coverage window ({from_doy}/{to_doy}) rather than a single
            # date, so these use highest_sequence_only to keep just the newest file per
            # distinct window.
            - pattern: 'spice/spin/imap_{from_doy}_{to_doy}_{sequence}.spin'
              highest_sequence_only: true
            - pattern: 'spice/activities/imap_{from_doy}_{to_doy}_hist_{sequence}.sff'
              highest_sequence_only: true

publish:
    api:
        <<: *sdc_creds
    work_sub_folder:

process:
    work_sub_folder:

upload:
    root_path: "Flight Data"
    paths_to_match:
        - "*science/mag/l1b/*"
        - "*science/mag/l1c/*"
        - "*science/mag/l1d/*"
        - "*science/mag/l2/*"
        - "*science/mag/l2-pre/*"
        - "*science/mag/l2-norm-offsets/*"
        - "*science/mag/l2-burst-offsets/*"
        - "*hk/mag/l1/*"
        - "*hk/sc/l1/*"
        - "*hk/lo/l1/*"
        - "*ialirt/*"
        - "*ialirt_hk/*"
        - "*quicklook/*"
        - "*spice/*"

postgres_upload:
    crump_config_path: imap-db-ingest-config.yaml
    database_url_env_var_or_block_name: "imap-database"
    enable_history: true
    paths_to_match:
        - "*hk/mag/l1/hsk-pw/*"
        - "*hk/mag/l1/hsk-sci/*"
        - "*hk/mag/l1/hsk-procstat/*"
        - "*hk/mag/l1/hsk-sid15/*"
        - "*hk/mag/l1/hsk-status/*"
        - "*hk/mag/l1/ehs-hkadc/*"
        - "*hk/mag/l1/els-confld/*"
        - "*hk/mag/l1/els-itf/*"
        - "*hk/mag/l1/mem-chckrep/*"
        - "*hk/mag/l1/prog-btsucc/*"
        - "*hk/mag/l1/prog-mtran/*"
        - "*hk/mag/l1/tcc-succ/*"
        - "*hk/sc/l1/x285/*"
        - "*hk/sc/l1/x286/*"
        - "ialirt_hk/**/imap_ialirt_hk*.csv"
        - "ialirt/**/imap_ialirt_*.csv"

datastore_cleanup:
    dry_run: false
    tasks:
        - name: "delete-all-non-latest-hk-l1-versions"
          paths_to_match:
              - "*hk/mag/l1/*"
              - "*hk/sc/l1/*"
          files_older_than: "24h"
          keep_latest_version_only: true
          cleanup_mode: "delete"
        - name: "delete-all-non-latest-l1d-versions"
          paths_to_match:
              - "*science/mag/l1d/*"
          files_older_than: "1h"
          keep_latest_version_only: true
          cleanup_mode: "delete"
        - name: "delete-l2pre-after-6months-last-modified"
          paths_to_match:
              - "*science/mag/l2-pre/*/*/imap_mag_l2-pre_*.cdf"
          files_older_than: "180d"
          keep_latest_version_only: false
          cleanup_mode: "delete"
        - name: "delete-all-non-gse-rtn-l1d-l2pre-l2-versions"
          paths_to_match:
              - "*science/mag/l1d/*/*/imap_mag_l1d_*-dsrf_*.cdf"
              - "*science/mag/l1d/*/*/imap_mag_l1d_*-srf_*.cdf"
              - "*science/mag/l1d/*/*/imap_mag_l1d_*-gsm_*.cdf"
              - "*science/mag/l2-pre/*/*/imap_mag_l2-pre_*-dsrf_*.cdf"
              - "*science/mag/l2-pre/*/*/imap_mag_l2-pre_*-srf_*.cdf"
              - "*science/mag/l2-pre/*/*/imap_mag_l2-pre_*-gsm_*.cdf"
              - "*science/mag/l2/*/*/imap_mag_l2_*-dsrf_*.cdf"
              - "*science/mag/l2/*/*/imap_mag_l2_*-srf_*.cdf"
              - "*science/mag/l2/*/*/imap_mag_l2_*-gsm_*.cdf"
          files_older_than: "24h"
          keep_latest_version_only: false
          cleanup_mode: "delete"
        - name: "delete-1hour-old-non-latest-science-versions"
          paths_to_match:
              - "*science/mag/l1b/*"
              - "*science/mag/l1c/*"
              - "*science/mag/l2/*"
          files_older_than: "1h"
          keep_latest_version_only: true
          cleanup_mode: "delete"
        - name: "delete-all-12week-old-quicklooks"
          paths_to_match:
              - "*quicklook/ialirt/**/*.png"
          files_older_than: "90d"
          keep_latest_version_only: false
          cleanup_mode: "delete"
